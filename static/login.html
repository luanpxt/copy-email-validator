<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Validator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Email Validator</h1>
      <p class="text-slate-400 text-sm mt-1">Score seu e-mail antes de enviar</p>
    </div>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
      <div id="error" class="hidden bg-red-900/50 border border-red-700 text-red-300 rounded-lg px-4 py-3 text-sm mb-4"></div>
      <form id="loginForm" onsubmit="doLogin(event)">
        <label class="block text-sm font-medium text-slate-300 mb-1">Senha de acesso</label>
        <input id="pw" type="password" placeholder="••••••••"
          class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
          autofocus>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg px-4 py-3 transition">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('error');
      err.classList.add('hidden');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: pw})
        });
        const data = await res.json();
        if (data.ok) {
          const dest = localStorage.getItem('onboarding_done') ? '/' : '/welcome';
          window.location.href = dest;
        } else {
          err.textContent = data.error || 'Senha incorreta';
          err.classList.remove('hidden');
        }
      } catch(e) {
        err.textContent = 'Erro de conexão';
        err.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
